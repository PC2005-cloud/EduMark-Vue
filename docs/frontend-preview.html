<script>
// ========== STATE ==========
let currentTab = 'dashboard';

function showDashboard() {
  document.getElementById('page-login').style.display = 'none';
  document.getElementById('page-dashboard').style.display = 'flex';
  switchTab('dashboard');
}

function toggleSidebar() {
  const s = document.getElementById('sidebar'), o = document.getElementById('sidebar-overlay');
  s.classList.toggle('-translate-x-full'); s.classList.toggle('lg:translate-x-0'); o.classList.toggle('hidden');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.sidebar-item').forEach(item => {
    const a = item.dataset.tab === tab;
    item.classList.toggle('bg-brand-50', a); item.classList.toggle('text-brand-700', a); item.classList.toggle('font-semibold', a);
    item.classList.toggle('text-ink-secondary', !a); item.classList.toggle('font-medium', !a);
  });
  if (window.innerWidth < 1024) { document.getElementById('sidebar').classList.add('-translate-x-full'); document.getElementById('sidebar-overlay').classList.add('hidden'); }
  renderTab(tab);
}

function renderTab(tab) {
  const c = document.getElementById('main-content');
  c.style.opacity = '0'; c.style.transform = 'translateY(8px)';
  setTimeout(() => {
    switch(tab) {
      case 'dashboard': renderDashboard(); break;
      case 'homework': renderHomework(); break;
      case 'knowledge': renderKnowledge(); break;
      case 'settings': renderSettings(); break;
      case 'admin': renderAdmin(); break;
    }
    c.style.opacity = '1'; c.style.transform = 'translateY(0)';
    c.style.transition = 'opacity 0.2s ease, transform 0.3s ease';
  }, 80);
}
